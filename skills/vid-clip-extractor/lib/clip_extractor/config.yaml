# Clip Extractor Configuration
# All thresholds tunable without code changes

detection:
  max_resolution_height: 480  # Downscale frames to this height before detection (saves CPU, coords are normalized)
  face:
    enabled: true
    min_confidence: 0.5
    model_selection: 1        # 0=short-range (<2m), 1=full-range (<5m)
    prefer_largest: true      # Track largest face (closest to camera)

  pose:
    enabled: true
    min_confidence: 0.5
    body_margin_pct: 0.15
    landmark_weights:
      nose: 0.4
      left_shoulder: 0.3
      right_shoulder: 0.3
  saliency:
    enabled: true
    threshold: 0.4
    min_area_pct: 0.02

fusion:
  face_weight: 0.6               # Face detection has highest priority
  pose_weight: 0.25              # Body framing as secondary signal
  saliency_weight: 0.15          # Visual focus as tertiary signal

content_priority:
  enabled: false                    # Opt-in: dynamically shift crop weight toward saliency when face is stable
  face_stability_window: 15         # Frames to assess face stability
  face_stability_threshold: 0.03    # Max face movement to count as "stable"
  divergence_threshold: 0.15        # Min face-saliency distance to trigger weight shift
  max_saliency_weight: 0.55         # Saliency ceiling during content priority
  ramp_frames: 10                   # Frames to ramp up/down weight shift

content_focus:
  enabled: false                    # Opt-in: dedicated layout for "show screen, not face"
  face_max_width: 0.15              # Face smaller than 15% of frame width = "small"
  divergence_threshold: 0.20        # Saliency-face distance to trigger content-focus
  render_mode: "letterbox"          # "letterbox" (full 16:9 centered) or "salient_zoom" (zoom into salient region)
  salient_zoom_padding: 0.15        # Padding around salient region in zoom mode
  min_segment_duration: 3.0         # Minimum content-focus segment length (seconds)

sampling:
  auto: true                  # Auto-select rate based on video duration
  frame_rate: 6               # Process every Nth frame (if auto=false)
  interpolation: "cubic"      # "linear", "cubic", or "nearest"

smoothing:
  method: "kalman"            # "ema" or "kalman"
  ema:
    alpha: 0.12               # Lower = smoother (more lag), higher = more responsive
  kalman:
    process_noise: 0.01       # Lower = smoother predictions
    measurement_noise: 0.1    # Higher = trust predictions more than measurements

scene_detection:
  enabled: true
  threshold: 0.15             # Histogram correlation below this = scene change (0.15 = less sensitive)
  min_interval: 30            # Minimum frames between scene change detections (cooldown)

deadzone:
  enabled: true
  threshold_pct: 0.05         # 5% of frame width — don't move unless face moves more
  vertical_threshold_pct: 0.08

crop:
  default_format: "9x16"      # "9x16" or "1x1"
  face_position:
    x_target: 0.5             # Horizontal: centered
    y_target: 0.38            # Vertical: face in upper 38% (golden ratio zone)
  padding:
    top_pct: 0.15             # Headroom above face
    bottom_pct: 0.45          # Space below face for body
  boundary_clamp: true        # Never show black bars

output:
  codec: "h264"
  preset: "veryfast"          # Reframed clips are intermediates (FFmpeg re-encodes during subtitle burn)
  crf: 23                     # Quality-speed tradeoff — 23 is adequate for intermediates
  use_nvenc: "auto"           # "auto" (detect GPU), "force", "disable"
  nvenc_preset: "p4"          # NVENC preset (p1=fastest, p7=best quality)
  scale_output: true          # Scale final output to target resolution
  generate_debug: false       # Create debug video with detection overlay
  static_crop_threshold: 20   # If crop_x range is below this (px), use a single static crop (skip sendcmd)
  scale_flags: "bilinear"     # "bilinear" (fast, fine for intermediates) or "lanczos" (highest quality)

speakers:
  mode: "primary"             # "primary" (largest face), "center" (average all)
  max_faces: 3
  switch_threshold: 0.3       # Confidence drop before switching tracked face

# Phase 5: Split-Screen Layout (for multi-person Zoom-like videos)
split_screen:
  top_ratio: 0.5              # Top half = 50% of output height (full source view)
  face_padding_pct: 1.0       # 100% padding — tight per-face crops for podcast-style close-ups
  merged_padding_pct: 2.5     # 250% padding for screen-share webcam (Option B: head + shoulders framing)
  min_face_size_pct: 0.0005   # Ignore faces smaller than 0.05% of frame area (Zoom faces are ~0.15-0.3%)
  merge_distance: 0.20        # Merge faces within 20% distance into one group (Zoom sidebar stacking)
  background: "blur"           # "black" or "blur" for letterbox areas in top and bottom halves
  dynamic_layout:
    enabled: true               # Auto-detect layout changes in podcast/interview videos
    face_size_threshold: 0.06   # Faces below this normalized width = gallery/split
    spatial_spread_threshold: 0.15  # Min horizontal distance between faces for split classification
    min_segment_duration: 2.0   # Merge segments shorter than this (seconds)
    smoothing_window: 25        # Majority vote window (keyframes) for noise elimination
    crossfade_frames: 12        # Transition crossfade duration (frames, ~0.4s at 30fps)
    mouth_centering: true       # Use MediaPipe mouth landmarks for vertical centering
    hysteresis:
      enabled: true             # Require consecutive frames before switching layout
      enter_streak: 5           # Consecutive frames of opposite layout before switching

# Phase 3: Clip Selection Engine
selection:
  clip_count: 7               # Target number of clips to extract
  min_duration: 45            # Minimum clip duration in seconds
  max_duration: 90            # Maximum clip duration in seconds
  padding: 1.0               # Breathing room at clip boundaries (seconds)
  anchor:
    search_window_sec: 15.0   # Search ±N seconds around estimated timestamp
    min_confidence: 0.5       # Below this, warn user about anchor match
    fuzzy_threshold: 75       # Minimum rapidfuzz ratio (0-100) for fuzzy match
  scoring:
    min_total_score: 50       # Clips below this threshold are flagged
